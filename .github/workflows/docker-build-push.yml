name: Build and Push Docker Images

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Optional Docker image tag'
        required: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine image tag
        id: tag
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            echo "IMAGE_TAG=release-${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          elif [ -n "${{ github.event.inputs.release_tag }}" ]; then
            echo "IMAGE_TAG=${{ github.event.inputs.release_tag }}" >> $GITHUB_OUTPUT
          else
            echo "IMAGE_TAG=latest" >> $GITHUB_OUTPUT
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push web image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_SUPABASE_URL=${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
            NEXT_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/peacock-time-web:${{ steps.tag.outputs.IMAGE_TAG }}
            ghcr.io/${{ github.repository_owner }}/peacock-time-web:latest

      - name: Build and push socket image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./server/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/peacock-time-socket:${{ steps.tag.outputs.IMAGE_TAG }}
            ghcr.io/${{ github.repository_owner }}/peacock-time-socket:latest

      - name: Logout
        run: docker logout ghcr.io
