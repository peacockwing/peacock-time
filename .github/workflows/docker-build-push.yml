name: Build and Push Docker Images

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Optional Docker image tag'
        required: false

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine image tag
        id: tag
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "release" ]; then
            echo "IMAGE_TAG=release-${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT
          elif [ -n "${{ github.event.inputs.release_tag }}" ]; then
            echo "IMAGE_TAG=${{ github.event.inputs.release_tag }}" >> $GITHUB_OUTPUT
          else
            echo "IMAGE_TAG=latest" >> $GITHUB_OUTPUT
          fi

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to registry
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push web image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.REGISTRY }}/peacock-time-web:${{ steps.tag.outputs.IMAGE_TAG }}
            ${{ secrets.REGISTRY }}/peacock-time-web:latest

      - name: Build and push socket image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./server/Dockerfile
          push: true
          tags: |
            ${{ secrets.REGISTRY }}/peacock-time-socket:${{ steps.tag.outputs.IMAGE_TAG }}
            ${{ secrets.REGISTRY }}/peacock-time-socket:latest

      - name: Logout
        run: docker logout ${{ secrets.REGISTRY }}
